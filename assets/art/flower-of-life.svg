<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flower of Life sacred geometry">
  <defs>
    <g id="fol-circle">
      <circle cx="0" cy="0" r="60"/>
    </g>
  </defs>
  <g fill="none" stroke="#C9A24B" stroke-width="1" opacity="0.45">
    <!-- center -->
    <use href="#fol-circle" x="300" y="300"/>
    <!-- ring 1 (6) -->
    <use href="#fol-circle" x="300" y="240"/>
    <use href="#fol-circle" x="300" y="360"/>
    <use href="#fol-circle" x="351.96" y="270"/>
    <use href="#fol-circle" x="351.96" y="330"/>
    <use href="#fol-circle" x="248.04" y="270"/>
    <use href="#fol-circle" x="248.04" y="330"/>
    <!-- ring 2 (12) -->
    <use href="#fol-circle" x="300" y="180"/>
    <use href="#fol-circle" x="300" y="420"/>
    <use href="#fol-circle" x="351.96" y="210"/>
    <use href="#fol-circle" x="351.96" y="390"/>
    <use href="#fol-circle" x="248.04" y="210"/>
    <use href="#fol-circle" x="248.04" y="390"/>
    <use href="#fol-circle" x="403.92" y="240"/>
    <use href="#fol-circle" x="403.92" y="360"/>
    <use href="#fol-circle" x="196.08" y="240"/>
    <use href="#fol-circle" x="196.08" y="360"/>
    <use href="#fol-circle" x="403.92" y="300"/>
    <use href="#fol-circle" x="196.08" y="300"/>
  </g>
  <!-- enclosing rings -->
  <g fill="none" stroke="#C9A24B" opacity="0.3">
    <circle cx="300" cy="300" r="180" stroke-width="1.2"/>
    <circle cx="300" cy="300" r="192" stroke-width="0.6"/>
  </g>
</svg>
