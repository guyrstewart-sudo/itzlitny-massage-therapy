<svg viewBox="0 0 200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Column of seven chakras">
  <defs>
    <filter id="chakraGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <!-- reusable 8-spoke star for chakra glyphs -->
    <g id="chakra-star8">
      <line x1="0" y1="-30" x2="0" y2="30"/>
      <line x1="-30" y1="0" x2="30" y2="0"/>
      <line x1="-21.2" y1="-21.2" x2="21.2" y2="21.2"/>
      <line x1="21.2" y1="-21.2" x2="-21.2" y2="21.2"/>
    </g>
    <g id="chakra-petals6">
      <path d="M0,-30 q9,12 0,24 q-9,-12 0,-24 z"/>
      <path d="M0,-30 q9,12 0,24 q-9,-12 0,-24 z" transform="rotate(60)"/>
      <path d="M0,-30 q9,12 0,24 q-9,-12 0,-24 z" transform="rotate(120)"/>
      <path d="M0,-30 q9,12 0,24 q-9,-12 0,-24 z" transform="rotate(180)"/>
      <path d="M0,-30 q9,12 0,24 q-9,-12 0,-24 z" transform="rotate(240)"/>
      <path d="M0,-30 q9,12 0,24 q-9,-12 0,-24 z" transform="rotate(300)"/>
    </g>
  </defs>

  <!-- central energy line -->
  <line x1="100" y1="60" x2="100" y2="840" stroke="#C9A24B" stroke-width="1" opacity="0.25"/>

  <!-- CROWN (violet) y=90 -->
  <g id="chakra-crown" transform="translate(100 90)">
    <circle r="30" fill="#9B5DE5" opacity="0.18" filter="url(#chakraGlow)"/>
    <g fill="none" stroke="#9B5DE5" stroke-width="1.4" opacity="0.9">
      <circle r="30"/>
      <circle r="20"/>
      <use href="#chakra-star8"/>
      <circle r="4" fill="#9B5DE5"/>
    </g>
  </g>

  <!-- THIRD EYE (indigo) y=210 -->
  <g id="chakra-thirdeye" transform="translate(100 210)">
    <circle r="30" fill="#5B5BD6" opacity="0.18" filter="url(#chakraGlow)"/>
    <g fill="none" stroke="#5B5BD6" stroke-width="1.4" opacity="0.9">
      <circle r="30"/>
      <path d="M-30,0 q30,-26 60,0 q-30,26 -60,0 z"/>
      <circle r="9"/>
      <circle r="3.5" fill="#5B5BD6"/>
    </g>
  </g>

  <!-- THROAT (blue) y=330 -->
  <g id="chakra-throat" transform="translate(100 330)">
    <circle r="30" fill="#2D9CDB" opacity="0.18" filter="url(#chakraGlow)"/>
    <g fill="none" stroke="#2D9CDB" stroke-width="1.4" opacity="0.9">
      <circle r="30"/>
      <use href="#chakra-petals6"/>
      <circle r="10"/>
      <circle r="3.5" fill="#2D9CDB"/>
    </g>
  </g>

  <!-- HEART (green) y=450 -->
  <g id="chakra-heart" transform="translate(100 450)">
    <circle r="30" fill="#3FA34D" opacity="0.18" filter="url(#chakraGlow)"/>
    <g fill="none" stroke="#3FA34D" stroke-width="1.4" opacity="0.9">
      <circle r="30"/>
      <polygon points="0,-18 15.6,-9 15.6,9 0,18 -15.6,9 -15.6,-9"/>
      <polygon points="0,18 15.6,9 15.6,-9 0,-18 -15.6,-9 -15.6,9"/>
      <circle r="3.5" fill="#3FA34D"/>
    </g>
  </g>

  <!-- SOLAR PLEXUS (gold) y=570 -->
  <g id="chakra-solar" transform="translate(100 570)">
    <circle r="30" fill="#F2C14E" opacity="0.2" filter="url(#chakraGlow)"/>
    <g fill="none" stroke="#F2C14E" stroke-width="1.4" opacity="0.95">
      <circle r="30"/>
      <polygon points="0,-22 19,11 -19,11"/>
      <polygon points="0,22 19,-11 -19,-11"/>
      <circle r="3.5" fill="#F2C14E"/>
    </g>
  </g>

  <!-- SACRAL (orange) y=690 -->
  <g id="chakra-sacral" transform="translate(100 690)">
    <circle r="30" fill="#E8833A" opacity="0.2" filter="url(#chakraGlow)"/>
    <g fill="none" stroke="#E8833A" stroke-width="1.4" opacity="0.95">
      <circle r="30"/>
      <circle r="16" cx="0" cy="0"/>
      <circle r="16" cx="14" cy="0"/>
      <circle r="3.5" fill="#E8833A"/>
    </g>
  </g>

  <!-- ROOT (red) y=810 -->
  <g id="chakra-root" transform="translate(100 810)">
    <circle r="30" fill="#C84B4B" opacity="0.2" filter="url(#chakraGlow)"/>
    <g fill="none" stroke="#C84B4B" stroke-width="1.4" opacity="0.95">
      <circle r="30"/>
      <polygon points="0,22 22,-12 -22,-12"/>
      <line x1="0" y1="-12" x2="0" y2="22"/>
      <circle r="3.5" fill="#C84B4B"/>
    </g>
  </g>
</svg>
