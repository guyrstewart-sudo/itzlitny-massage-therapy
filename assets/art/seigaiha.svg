<svg viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Seigaiha wave pattern tile">
  <defs>
    <!-- one fan of concentric arcs = a single wave scale -->
    <g id="seigaiha-scale">
      <circle cx="0" cy="0" r="40" fill="none" stroke="#C9A24B" stroke-width="0.9" opacity="0.55"/>
      <circle cx="0" cy="0" r="31" fill="none" stroke="#C9A24B" stroke-width="0.8" opacity="0.45"/>
      <circle cx="0" cy="0" r="22" fill="none" stroke="#C9A24B" stroke-width="0.8" opacity="0.4"/>
      <circle cx="0" cy="0" r="13" fill="none" stroke="#C9A24B" stroke-width="0.8" opacity="0.35"/>
      <circle cx="0" cy="0" r="5" fill="none" stroke="#C9A24B" stroke-width="0.8" opacity="0.3"/>
    </g>
  </defs>
  <!-- clip so only the lower half-arcs of each scale show (seigaiha look) -->
  <clipPath id="seigaiha-clip"><rect x="0" y="0" width="240" height="120"/></clipPath>
  <g clip-path="url(#seigaiha-clip)">
    <!-- row A (y = 40), centers every 40 -->
    <use href="#seigaiha-scale" x="0"   y="40"/>
    <use href="#seigaiha-scale" x="40"  y="40"/>
    <use href="#seigaiha-scale" x="80"  y="40"/>
    <use href="#seigaiha-scale" x="120" y="40"/>
    <use href="#seigaiha-scale" x="160" y="40"/>
    <use href="#seigaiha-scale" x="200" y="40"/>
    <use href="#seigaiha-scale" x="240" y="40"/>
    <!-- row B offset by 20, y = 80 -->
    <use href="#seigaiha-scale" x="-20" y="80"/>
    <use href="#seigaiha-scale" x="20"  y="80"/>
    <use href="#seigaiha-scale" x="60"  y="80"/>
    <use href="#seigaiha-scale" x="100" y="80"/>
    <use href="#seigaiha-scale" x="140" y="80"/>
    <use href="#seigaiha-scale" x="180" y="80"/>
    <use href="#seigaiha-scale" x="220" y="80"/>
    <!-- row C, y = 120 (bottom edge, for seamless tiling) -->
    <use href="#seigaiha-scale" x="0"   y="120"/>
    <use href="#seigaiha-scale" x="40"  y="120"/>
    <use href="#seigaiha-scale" x="80"  y="120"/>
    <use href="#seigaiha-scale" x="120" y="120"/>
    <use href="#seigaiha-scale" x="160" y="120"/>
    <use href="#seigaiha-scale" x="200" y="120"/>
    <use href="#seigaiha-scale" x="240" y="120"/>
    <!-- row top (y=0) for vertical tiling continuity -->
    <use href="#seigaiha-scale" x="-20" y="0"/>
    <use href="#seigaiha-scale" x="20"  y="0"/>
    <use href="#seigaiha-scale" x="60"  y="0"/>
    <use href="#seigaiha-scale" x="100" y="0"/>
    <use href="#seigaiha-scale" x="140" y="0"/>
    <use href="#seigaiha-scale" x="180" y="0"/>
    <use href="#seigaiha-scale" x="220" y="0"/>
  </g>
</svg>
