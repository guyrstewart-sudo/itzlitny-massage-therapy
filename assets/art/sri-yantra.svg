<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sri Yantra interlocking triangles">
  <g fill="none" stroke="#C9A24B" stroke-width="1.1" opacity="0.55" stroke-linejoin="round">
    <!-- Upward-pointing (Shiva) triangles, apex up -->
    <polygon points="300,108 132,408 468,408"/>
    <polygon points="300,162 168,378 432,378"/>
    <polygon points="300,206 196,360 404,360"/>
    <polygon points="300,250 222,342 378,342"/>
    <!-- Downward-pointing (Shakti) triangles, apex down -->
    <polygon points="300,492 132,210 468,210"/>
    <polygon points="300,440 168,234 432,234"/>
    <polygon points="300,396 196,256 404,256"/>
    <polygon points="300,352 222,276 378,276"/>
  </g>
  <!-- bindu (center point) -->
  <circle cx="300" cy="300" r="5" fill="#C9A24B" opacity="0.8"/>
  <!-- surrounding lotus rings -->
  <g fill="none" stroke="#C9A24B" opacity="0.35">
    <circle cx="300" cy="300" r="210" stroke-width="1"/>
    <circle cx="300" cy="300" r="240" stroke-width="0.8"/>
  </g>
  <!-- 8-petal lotus ring -->
  <g fill="none" stroke="#C9A24B" stroke-width="0.9" opacity="0.4">
    <g id="sy-petal">
      <path d="M300,210 q22,30 0,60 q-22,-30 0,-60 z"/>
    </g>
    <use href="#sy-petal" transform="rotate(45 300 300)"/>
    <use href="#sy-petal" transform="rotate(90 300 300)"/>
    <use href="#sy-petal" transform="rotate(135 300 300)"/>
    <use href="#sy-petal" transform="rotate(180 300 300)"/>
    <use href="#sy-petal" transform="rotate(225 300 300)"/>
    <use href="#sy-petal" transform="rotate(270 300 300)"/>
    <use href="#sy-petal" transform="rotate(315 300 300)"/>
    <use href="#sy-petal"/>
  </g>
  <!-- outer square gate (bhupura) -->
  <g fill="none" stroke="#C9A24B" stroke-width="1" opacity="0.3">
    <rect x="48" y="48" width="504" height="504"/>
    <rect x="60" y="60" width="480" height="480"/>
  </g>
</svg>
